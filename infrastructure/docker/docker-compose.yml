services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geo-postgis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: geo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  tegola:
    image: gospatial/tegola:v0.21.2
    container_name: geo-tegola
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./tiles/tegola.toml:/etc/tegola/tegola.toml
    command: serve --config /etc/tegola/tegola.toml

  
volumes:
  postgis_data: